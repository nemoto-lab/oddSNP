{% set version = "0.0.1" %}
{% set name = "oddsnp" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nemoto-lab/oddSNP/archive/v{{ version }}.tar.gz
  sha256: <SHA256_HASH>

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - oddSNP = oddSNP.__main__:oddSNP

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools

  run:
    - python >=3.12
    - click
    - pandas
    - pysam
    - plotly
    - nbformat
    - python-kaleido      # conda-forge name for kaleido
    - tqdm
    - more-itertools      # conda-forge name for more_itertools
    - joblib
    - requests
    - ipykernel
    - threadpoolctl
    - vireosnp
    - cellsnp-lite 

test:
  imports:
    - oddSNP
  commands:
    - oddSNP --help

about:
  home: https://github.com/nemoto-lab/oddSNP
  license: Apache-2.0
  license_file: LICENSE
  summary: "A CLI tool for Optimizing demultiplexing pooled experiments based on Single-Nucleotide Polymorphism"

extra:
  authors:
    - Rodolfo Allendes <rodolfo.allendes.prime@osaka-u.ac.jp>
    - Takahiro Nemoto <nemoto.takahiro.prime@osaka-u.ac.jp>